name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Build-time placeholders. Replace with repository secrets if the build
      # ever needs to reach real auth / API services.
      AUTH_SECRET: dummy_auth_secret_for_build_only_0000000000
      GOOGLE_CLIENT_ID: dummy.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: dummy_google_secret
      NEXT_PUBLIC_API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Non-blocking: surfaces lint issues without gating merges on pre-existing
      # react-hooks/set-state-in-effect debt unrelated to a given PR.
      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build
